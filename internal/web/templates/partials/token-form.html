{{define "token-form"}}
<div class="modal-header">
    <h2>{{if .Token}}Edit Token{{else}}Add Token{{end}}</h2>
    <button class="modal-close" onclick="hideModal()">&times;</button>
</div>
<div class="modal-body">
    {{if .Token}}
    <form hx-put="/web/tokens/{{.Token.ID}}"
          hx-target="#tokens-table"
          hx-swap="innerHTML">
    {{else}}
    <form hx-post="/web/tokens"
          hx-target="#tokens-table"
          hx-swap="innerHTML">
    {{end}}
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name"
                   value="{{if .Token}}{{.Token.Name}}{{end}}"
                   placeholder="e.g. Farmer Vasya BM1"
                   required/>
            <span class="form-hint">Helps identify which token has issues</span>
        </div>
        <div class="form-group">
            <label for="access_token">Access Token</label>
            <input type="text" id="access_token" name="access_token"
                   value="{{if .Token}}{{maskToken .Token.AccessToken}}{{end}}"
                   placeholder="EAAxxxxxxxxxxxxxxxxxxxxxxx"
                   autocomplete="off"/>
            {{if .Token}}<span class="form-hint">Leave blank to keep existing token</span>{{end}}
        </div>
        <div class="form-group">
            <label for="expires_at">Expires At (optional)</label>
            <input type="date" id="expires_at" name="expires_at"
                   value="{{if .Token}}{{formatDate .Token.ExpiresAt}}{{end}}"/>
            <span class="form-hint">Leave blank for non-expiring system user tokens</span>
        </div>
        <div class="modal-footer" style="padding: 0; border: none; margin-top: 1.5rem;">
            <button type="button" class="btn btn-secondary" onclick="hideModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">
                <span class="htmx-indicator">⟳</span>
                {{if .Token}}Save{{else}}Add Token{{end}}
            </button>
        </div>
    </form>
</div>
{{end}}
